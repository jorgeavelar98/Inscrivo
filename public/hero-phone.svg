<!-- TODO: PLACEHOLDER. Replace with a real screenshot/mock of a restaurant site Inscrivo built, shown on a phone. -->
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="640" viewBox="0 0 520 640" fill="none" role="img" aria-label="Restaurant website on a phone (placeholder)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f3329"/>
      <stop offset="1" stop-color="#14241c"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4a23c"/>
      <stop offset="1" stop-color="#b9862a"/>
    </linearGradient>
  </defs>
  <rect width="520" height="640" fill="url(#bg)"/>
  <!-- phone -->
  <rect x="150" y="40" width="240" height="520" rx="34" fill="#0c1611" stroke="#2c4438" stroke-width="2"/>
  <rect x="162" y="58" width="216" height="484" rx="22" fill="#ffffff"/>
  <rect x="234" y="48" width="72" height="8" rx="4" fill="#2c4438"/>
  <!-- screen: hero photo -->
  <rect x="162" y="58" width="216" height="150" rx="22" fill="url(#hero)"/>
  <rect x="162" y="186" width="216" height="22" fill="url(#hero)"/>
  <text x="182" y="120" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Osteria</text>
  <text x="182" y="146" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Bella</text>
  <!-- call button -->
  <rect x="182" y="224" width="176" height="34" rx="17" fill="#14241c"/>
  <text x="270" y="246" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Call now</text>
  <!-- menu rows -->
  <rect x="182" y="282" width="120" height="12" rx="6" fill="#14241c"/>
  <g fill="#e7e3dc">
    <rect x="182" y="312" width="100" height="48" rx="8"/>
    <rect x="290" y="312" width="68" height="48" rx="8"/>
    <rect x="182" y="372" width="68" height="48" rx="8"/>
    <rect x="258" y="372" width="100" height="48" rx="8"/>
  </g>
  <g fill="#cfcabf">
    <rect x="182" y="436" width="176" height="10" rx="5"/>
    <rect x="182" y="456" width="140" height="10" rx="5"/>
    <rect x="182" y="476" width="160" height="10" rx="5"/>
  </g>
  <!-- floating tag -->
  <rect x="40" y="430" width="170" height="64" rx="14" fill="#ffffff"/>
  <circle cx="74" cy="462" r="16" fill="#d4a23c"/>
  <rect x="100" y="450" width="92" height="10" rx="5" fill="#14241c"/>
  <rect x="100" y="468" width="70" height="8" rx="4" fill="#88928c"/>
</svg>
